<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA | P13 - Fechamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            
            --gold: #d4a849;
            --gold-bright: #f0c96b;
            --gold-dim: #a07d2e;
            --gold-border: rgba(212, 168, 73, 0.3);
            
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            
            --gradient-gold: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 50%, var(--gold-bright) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Textura de noise */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.025;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* =============================================
           SEÇÃO FECHAMENTO
           ============================================= */
        .secao-fechamento {
            padding: 100px 0;
            background: linear-gradient(180deg, #0a0a0a 0%, #0f0f0f 100%);
            text-align: center;
            position: relative;
        }

        /* Linha dourada no topo */
        .secao-fechamento::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: var(--gradient-gold);
        }

        .fechamento-headline {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 500;
            line-height: 1.25;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .fechamento-headline .destaque {
            color: var(--gold);
            font-style: italic;
        }

        .fechamento-sub {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .fechamento-punch {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 40px;
        }

        /* CTA */
        .fechamento-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 20px 48px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            background: var(--gradient-gold);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(212, 168, 73, 0.3);
        }

        .fechamento-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 60px rgba(212, 168, 73, 0.5);
        }

        .fechamento-cta svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .fechamento-garantias {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .fechamento-garantias span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .fechamento-garantias span::before {
            content: '✓';
            color: var(--gold);
            font-weight: 700;
        }

        /* =============================================
           RESPONSIVO
           ============================================= */
        @media (max-width: 768px) {
            .secao-fechamento {
                padding: 70px 0;
            }

            .container {
                padding: 0 20px;
            }

            .fechamento-headline {
                font-size: 1.75rem;
            }

            .fechamento-sub {
                font-size: 1.05rem;
            }

            .fechamento-punch {
                font-size: 1.1rem;
                margin-bottom: 32px;
            }

            .fechamento-cta {
                width: 100%;
                justify-content: center;
                padding: 18px 32px;
                font-size: 1rem;
            }

            .fechamento-garantias {
                gap: 16px;
            }

            .fechamento-garantias span {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .fechamento-headline {
                font-size: 1.5rem;
            }

            .fechamento-garantias {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- =============================================
         P13 - SEÇÃO FECHAMENTO
         ============================================= -->
    <section class="secao-fechamento">
        <div class="container">
            
            <h2 class="fechamento-headline">
                A dúvida que você carrega hoje<br>
                <span class="destaque">não vai desaparecer sozinha.</span>
            </h2>

            <p class="fechamento-sub">Ela estava lá ontem. Vai estar lá amanhã. E daqui a um ano.</p>
            
            <p class="fechamento-punch">A única coisa que muda é o preço que você paga por não saber.</p>

            <a href="#preco" class="fechamento-cta">
                FAZER O MAPA AGORA
                <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>

            <div class="fechamento-garantias">
                <span>R$147</span>
                <span>Resultado imediato</span>
                <span>7 dias de garantia</span>
            </div>

        </div>
    </section>

</body>
</html>
